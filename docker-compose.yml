services:
  audio-service:
    build: ./audio-service
    ports:
      - "5001:5001"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotaste
      POSTGRES_PASSWORD: spotaste
      POSTGRES_DB: spotaste
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
